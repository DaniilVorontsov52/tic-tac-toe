<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />

		<meta name="description" content="" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="stylesheet" href="" />
		<link rel="stylesheet" href="style.css" />
	</head>
	<body class="colb5">
		<div class="space2"></div>
		<div class="cont">
			<div class="box1">
				<div class="box3">
					<img src="/ASSETS/Combined Shape Copy.png" alt="" />
					<img src="/ASSETS/Oval Copy (1).png" alt="" />
				</div>
				<div class="box4 colb6">
					<p id="turn" class="cent colt8"></p>
					<p class="cent colt8">TURN</p>
				</div>
				<div class="box5">
					<a href="/HOME/home.html"
						><button class="btn3">
							<img src="/ASSETS/Redo.svg" alt="" /></button
					></a>
				</div>
			</div>
			<div class="space"></div>
			<div id="board" class="wrapper">
				<div id="squares" class="one colb6"></div>
				<div id="squares" class="two colb6"></div>
				<div id="squares" class="three colb6"></div>
				<div id="squares" class="four colb6"></div>
				<div id="squares" class="five colb6"></div>
				<div id="squares" class="six colb6"></div>
				<div id="squares" class="seven colb6"></div>
				<div id="squares" class="eith colb6"></div>
				<div id="squares" class="nine colb6"></div>
			</div>
			<div class="space"></div>
			<div class="box2">
				<div class="box6 colb1 marg0">
					<p class="marg0">X (P2)</p>
					<p id="winx" class="marg0">0</p>
				</div>
				<div class="box7 colb7 marg0">
					<p class="marg0">TIES</p>
					<p id="ties" class="marg0">0</p>
				</div>
				<div class="box8 colb3 marg0">
					<p class="marg0">O (P1)</p>
					<p id="wino" class="marg0">0</p>
				</div>
			</div>
		</div>
		<dialog id="p1" class="p1">
			<div class="contd">
				<div class="txt1">
					<p>PLAYER 1 WINS!</p>
				</div>
				<div class="space3"></div>
				<div class="txt2">
					<img class="img1" src="/ASSETS/Oval Copy (1).png" alt="" />
					<h1>TAKES THE ROUND</h1>
				</div>
				<div class="space3"></div>
				<div class="txt3">
					<button class="btn3 size">QUIT</button>
					<button class="btn2 size">NEXT ROUND</button>
				</div>
			</div>
		</dialog>
		<dialog id="p2" class="p2">
			<div class="contd">
				<div class="txt1">
					<p>PLAYER 2 WINS!</p>
				</div>
				<div class="space3"></div>
				<div class="txt22">
					<img class="img1" src="/ASSETS/Combined Shape Copy.png" alt="" />
					<h1>TAKES THE ROUND</h1>
				</div>
				<div class="space3"></div>
				<div class="txt3">
					<button class="btn3 size">QUIT</button>
					<button class="btn2 size">NEXT ROUND</button>
				</div>
			</div>
		</dialog>
		<dialog class="d3">
			<div class="contd">
				<div class="b33">ROUND TIED</div>
				<div class="txt3">
					<button class="btn3 size">QUIT</button>
					<button class="btn2 size">NEXT ROUND</button>
				</div>
			</div>
		</dialog>
		<script>
			const $test = document.querySelector("#test");
			const $p1 = document.querySelector("#p1");
			const $p2 = document.querySelector("#p2");
			const $winx = document.querySelector("#winx");
			const $wino = document.querySelector("#wino");
			const $turn = document.querySelector("#turn");

			const $board = document.getElementById("board");
			const $squares = document.getElementsByClassName("square");
			const $players = ["X", "O"];
			
			let currentPlayer = $players[0];

			$turn.textContent = `X`;

			const winning_combinations = [
				[0, 1, 2],
				[3, 4, 5],
				[6, 7, 8],
				[0, 3, 6],
				[1, 4, 7],
				[2, 5, 8],
				[0, 4, 8],
				[2, 4, 6],
			];

			function checkWin(currentPlayer) {
				for (let i = 0; i < winning_combinations.length; i++) {
					const [a, b, c] = winning_combinations[i];
					if (
						$squares[a].textContent === currentPlayer &&
						$squares[b].textContent === currentPlayer &&
						$squares[c].textContent === currentPlayer
					) {
						return true;
					}
				}
				return false;
			}

			function checkTie() {
				for (let i = 0; i < $squares.length; i++) {
					if ($squares[i].textContent === "") {
						return false;
					}
				}
				return true;
			}

			for (let i = 0; i < $squares.length; i++) {
				$squares[i].addEventListener("click", () => {
					if ($squares[i].textContent !== "") {
						return;
					}
					$squares[i].textContent = currentPlayer;
					if (checkWin(currentPlayer)) {
						$turn.textContent = `Game over! ${currentPlayer} wins!`;
						return;
					}
					if (checkTie()) {
						$turn.textContent = `Game is tied!`;
						return;
					}
					currentPlayer =
						currentPlayer === players[0] ? players[1] : players[0];
					if (currentPlayer == players[0]) {
						$turn.textContent = `X's turn!`;
					} else {
						$turn.textContent = `O's turn!`;
					}
				});
			}


			$test.addEventListener("click", () => {
				$p2.showModal();
				openCheck($p2);
			});
		</script>
	</body>
</html>
