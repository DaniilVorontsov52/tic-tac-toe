<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<title></title>
		<meta name="description" content="" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="stylesheet" href="" />
		<link rel="stylesheet" href="style0.css" />
	</head>
	<body class="colb5">
		<div class="space2"></div>
		<div class="cont">
			<div class="box1">
				<div class="box3">
					<img src="/ASSETS/Combined Shape Copy.png" alt="X" />
					<img src="/ASSETS/Oval Copy (1).png" alt="O" />
				</div>
				<div class="box4 colb6">
					<p id="turn" class="cent colt8"></p>
					<p class="cent colt8">TURN</p>
				</div>
				<div class="box5">
					<a href="/HOME/home.html">
						<button class="btn3">
							<img src="/ASSETS/Redo.svg" alt="Restart" />
						</button>
					</a>
				</div>
			</div>
			<div class="space"></div>
			<div id="board" class="wrapper">
				<div class="square one colb6 boxclss" data-index="0"></div>
				<div class="square two colb6 boxclss" data-index="1"></div>
				<div class="square three colb6 boxclss" data-index="2"></div>
				<div class="square four colb6 boxclss" data-index="3"></div>
				<div class="square five colb6 boxclss" data-index="4"></div>
				<div class="square six colb6 boxclss" data-index="5"></div>
				<div class="square seven colb6 boxclss" data-index="6"></div>
				<div class="square eith colb6 boxclss" data-index="7"></div>
				<div class="square nine colb6 boxclss" data-index="8"></div>
			</div>
			<div class="space"></div>
			<div class="box2">
				<div class="box6 colb1 marg0">
					<p class="marg0">X (P2)</p>
					<p id="winx" class="marg0">0</p>
				</div>
				<div class="box7 colb7 marg0">
					<p class="marg0">TIES</p>
					<p id="ties" class="marg0">0</p>
				</div>
				<div class="box8 colb3 marg0">
					<p class="marg0">O (P1)</p>
					<p id="wino" class="marg0">0</p>
				</div>
			</div>
		</div>
		<dialog id="p1" class="p1">
			<div class="contd">
				<div class="txt1"><p>PLAYER 1 WINS!</p></div>
				<div class="space3"></div>
				<div class="txt2">
					<img class="img1" src="/ASSETS/Oval Copy (1).png" alt="O" />
					<h1>TAKES THE ROUND</h1>
				</div>
				<div class="space3"></div>
				<div class="txt3">
					<button class="btn3 size quit">QUIT</button>
					<button class="btn2 size next">NEXT ROUND</button>
				</div>
			</div>
		</dialog>
		<dialog id="p2" class="p2">
			<div class="contd">
				<div class="txt1"><p>PLAYER 2 WINS!</p></div>
				<div class="space3"></div>
				<div class="txt22">
					<img class="img1" src="/ASSETS/Combined Shape Copy.png" alt="X" />
					<h1>TAKES THE ROUND</h1>
				</div>
				<div class="space3"></div>
				<div class="txt3">
					<button class="btn3 size quit">QUIT</button>
					<button class="btn2 size next">NEXT ROUND</button>
				</div>
			</div>
		</dialog>
		<dialog class="d3">
			<div class="contd3">
				<div class="b33">ROUND TIED</div>
				<div class="space2"></div>
				<div class="txt33">
					<button class="btn3 size quit">QUIT</button>
					<button class="btn2 size next">NEXT ROUND</button>
				</div>
			</div>
		</dialog>
		<script>
			const turnEl = document.getElementById("turn");
			const winXEl = document.getElementById("winx");
			const winOEl = document.getElementById("wino");
			const tiesEl = document.getElementById("ties");
			const p1WinDlg = document.getElementById("p1");
			const p2WinDlg = document.getElementById("p2");
			const tieDlg = document.querySelector(".d3");
			const squares = document.querySelectorAll("#board .square");
			const imgX = "/ASSETS/Combined Shape Copy.png";
			const imgO = "/ASSETS/Oval Copy (1).png";
			let board = Array(9).fill(null);
			let currentPlayer = "X";
			let gameActive = true;
			turnEl.innerHTML = `<img src="${imgX}" alt="X">`;
			const winningCombinations = [
				[0, 1, 2],
				[3, 4, 5],
				[6, 7, 8],
				[0, 3, 6],
				[1, 4, 7],
				[2, 5, 8],
				[0, 4, 8],
				[2, 4, 6],
			];
			function checkWin(player) {
				return winningCombinations.some((combo) =>
					combo.every((i) => board[i] === player),
				);
			}
			function checkTie() {
				return board.every((cell) => cell !== null);
			}
			function endGame(winner) {
				gameActive = false;
				if (winner === "X") {
					winXEl.textContent = Number(winXEl.textContent) + 1;
					p2WinDlg.showModal();
				} else if (winner === "O") {
					winOEl.textContent = Number(winOEl.textContent) + 1;
					p1WinDlg.showModal();
				} else {
					tiesEl.textContent = Number(tiesEl.textContent) + 1;
					tieDlg.showModal();
				}
			}
			function resetBoard() {
				board = Array(9).fill(null);
				squares.forEach((sq) => (sq.innerHTML = ""));
				currentPlayer = "X";
				gameActive = true;
				turnEl.innerHTML = `<img src="${imgX}" alt="X">`;
			}
			squares.forEach((square) => {
				square.addEventListener("click", () => {
					if (!gameActive) return;
					const index = Number(square.dataset.index);
					if (board[index] !== null) return;
					board[index] = currentPlayer;
					square.innerHTML = `<img src="${currentPlayer === "X" ? imgX : imgO}" alt="${currentPlayer}">`;
					if (checkWin(currentPlayer)) {
						endGame(currentPlayer);
						return;
					}
					if (checkTie()) {
						endGame(null);
						return;
					}
					currentPlayer = currentPlayer === "X" ? "O" : "X";
					turnEl.innerHTML = `<img src="${currentPlayer === "X" ? imgX : imgO}" alt="${currentPlayer}">`;
				});
			});
			document.querySelectorAll(".next").forEach((btn) =>
				btn.addEventListener("click", () => {
					p1WinDlg.close();
					p2WinDlg.close();
					tieDlg.close();
					resetBoard();
				}),
			);
			document.querySelectorAll(".quit").forEach((btn) =>
				btn.addEventListener("click", () => {
					location.href = "/HOME/home.html";
				}),
			);
		</script>
	</body>
</html>
